<!DOCTYPE html>
<html>
<head>
    <title>Fatter Matter Calorie Tracker</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: linear-gradient(#ffeb99, #ffb84d, #ff9933);
            color: #5a2e00;
        }

        header {
            background-color: #ff9900;
            padding: 25px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            border-bottom: 4px solid #ffcc33;
        }

        .button {
            display: block;
            margin: 15px auto;
            padding: 14px;
            width: 280px;
            background-color: #ffcc33;
            color: #5a2e00;
            text-decoration: none;
            border-radius: 14px;
            font-weight: bold;
            border: 3px solid #ff9900;
            font-size: 18px;
            transition: 0.2s;
        }

        .button:hover {
            background-color: #ffb84d;
            transform: scale(1.05);
        }

        .section {
            background: #fff7e6;
            margin: 40px;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #ffcc33;
        }

        .placeholder {
            width: 220px;
            height: 220px;
            background: #ffe0b3;
            margin: auto;
            border-radius: 12px;
            padding-top: 80px;
            color: #5a2e00;
            font-size: 16px;
        }

        footer {
            background-color: #ff9900;
            padding: 15px;
            color: white;
            margin-top: 40px;
            font-weight: bold;
            border-top: 4px solid #ffcc33;
        }
    </style>
</head>

<body>

    <header>
        Fatter Matter Calorie Tracker
        <p style="font-size:18px; margin:0;">Main Page</p>
    </header>

    <!-- ⭐ USER STATUS SECTION ⭐ -->
    <div id="userStatus" style="margin-top:20px; font-size:20px; font-weight:bold;"></div>
    <button id="logoutBtn" class="button" style="display:none; width:200px;">Logout</button>

    <!-- ⭐ LOGIN / SIGNUP BUTTONS ⭐ -->
    <a id="loginBtn" class="button" href="login.html">Login</a>
    <a id="signupBtn" class="button" href="signup.html">Sign Up</a>

    <h2>Explore the Project</h2>

    <a class="button" href="FMCT_Proj_Purpose.html">Project Purpose</a>
    <a class="button" href="FMCT_Parts.html">Parts I Used</a>
    <a class="button" href="FMCT_How_It_Helps.html">How It Helps People</a>

    <a class="button" href="FMCT_Challenges.html">Challenges I Faced</a>

    <div class="section">
        <h2>Project Picture</h2>
        <div class="placeholder">Your picture will go here</div>
    </div>

    <footer>
        Fatter Matter Calorie Tracker
    </footer>

<!-- ⭐ FIREBASE SCRIPTS ⭐ -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZVkqvd1HJaAFA9JjUsk3HuYahO7-m_qc",
  authDomain: "fmct-58e22.firebaseapp.com",
  projectId: "fmct-58e22",
  storageBucket: "fmct-58e22.firebasestorage.app",
  messagingSenderId: "479095036843",
  appId: "1:479095036843:web:e800df57bb2b01f5f4d0ee"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ⭐ CHECK IF USER IS LOGGED IN ⭐ */
auth.onAuthStateChanged(user => {
    const userStatus = document.getElementById("userStatus");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");

    if (user) {
        userStatus.innerHTML = "Welcome, " + user.email + "!";
        logoutBtn.style.display = "block";
        loginBtn.style.display = "none";
        signupBtn.style.display = "none";
    } else {
        userStatus.innerHTML = "You are not logged in.";
        logoutBtn.style.display = "none";
        loginBtn.style.display = "block";
        signupBtn.style.display = "block";
    }
});

/* ⭐ LOGOUT FUNCTION ⭐ */
document.getElementById("logoutBtn").onclick = function() {
    auth.signOut().then(() => {
        alert("Logged out!");
        window.location.reload();
    });
};
</script>

</body>
</html>
